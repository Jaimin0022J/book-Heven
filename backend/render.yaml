services:
  - type: web
    name: bookhaven-api
    runtime: node
    plan: free
    buildCommand: npm install && cd ../backend && npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        fromContext: db_url
      - key: JWT_SECRET
        generateValue: true
    rootDirectory: backend
